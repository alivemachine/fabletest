name: Deploy layer console to GitHub Pages

on:
  push:
    branches:
      - claude/map-layers-animation-prototype-j106dp
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Never cancel an in-progress Pages deploy: interrupting the publish step is a
# known cause of "Deployment failed, try again later" wedging the environment.
# Queue instead, per GitHub's Pages guidance.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Assemble site (web UI + the Python world code it runs)
        run: |
          mkdir -p _site
          cp -r web/* _site/
          cp worldgen.py common.py hydrology.py lighting.py history.py \
             ecosim.py world_core.py _site/
      - name: Cache the Pyodide release tarball
        id: pyodide-cache
        uses: actions/cache@v4
        with:
          path: pyodide.tar.bz2
          key: pyodide-0.26.4
      - name: Download Pyodide (cache miss only)
        if: steps.pyodide-cache.outputs.cache-hit != 'true'
        run: |
          curl -sSL -o pyodide.tar.bz2 \
            https://github.com/pyodide/pyodide/releases/download/0.26.4/pyodide-0.26.4.tar.bz2
      - name: Vendor Pyodide runtime + numpy (self-hosted, no CDN)
        run: |
          tar xjf pyodide.tar.bz2
          mkdir -p _site/pyodide
          cp pyodide/pyodide.js pyodide/pyodide.mjs pyodide/pyodide.asm.js \
             pyodide/pyodide.asm.wasm pyodide/python_stdlib.zip pyodide/pyodide-lock.json \
             _site/pyodide/
          cp pyodide/numpy-*.whl _site/pyodide/
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
